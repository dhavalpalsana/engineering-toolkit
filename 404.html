<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Engineering Toolkit</title>
  <meta name="description" content="The page you're looking for doesn't exist or has been moved. Return to the Engineering Toolkit dashboard.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Global Theme Tokens -->
  <link rel="stylesheet" href="css/theme.css">

  <style>
    /* ── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Subtle Background Grid ───────────────────────────── */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
      background-size: 64px 64px;
      opacity: 0.45;
      pointer-events: none;
    }

    /* ── Accent Glow Orb ──────────────────────────────────── */
    body::after {
      content: '';
      position: absolute;
      width: 480px;
      height: 480px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-primary-glow) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      filter: blur(40px);
      opacity: 0.6;
    }

    /* ── Container ────────────────────────────────────────── */
    .error-container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 48px 32px;
      max-width: 520px;
      width: 100%;
      animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* ── 404 Heading ──────────────────────────────────────── */
    .error-code {
      font-size: clamp(96px, 18vw, 160px);
      font-weight: var(--font-weight-extrabold);
      line-height: 1;
      letter-spacing: -4px;
      background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }

    /* ── Subheading ───────────────────────────────────────── */
    .error-title {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-semibold);
      color: var(--text-primary);
      margin-bottom: 12px;
      animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    /* ── Body Message ─────────────────────────────────────── */
    .error-message {
      font-size: var(--font-size-base);
      color: var(--text-muted);
      line-height: 1.65;
      max-width: 400px;
      margin: 0 auto 36px;
      animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }

    /* ── CTA Button ───────────────────────────────────────── */
    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: #ffffff;
      background: var(--accent-primary);
      border: none;
      border-radius: var(--radius-md);
      text-decoration: none;
      cursor: pointer;
      box-shadow: var(--shadow-md), 0 0 0 0 var(--accent-primary-glow);
      transition:
        background var(--transition-fast),
        box-shadow var(--transition-fast),
        transform var(--transition-fast);
      animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
    }

    .back-button:hover {
      background: var(--accent-primary-hover);
      box-shadow: var(--shadow-hover), 0 0 0 4px var(--accent-primary-glow);
      transform: translateY(-2px);
    }

    .back-button:active {
      transform: translateY(0);
      box-shadow: var(--shadow-sm);
    }

    .back-button svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ── Divider ───────────────────────────────────────────── */
    .error-divider {
      width: 48px;
      height: 3px;
      border-radius: var(--radius-full);
      background: var(--border-color);
      margin: 0 auto 24px;
      animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
    }

    /* ── Keyframes ────────────────────────────────────────── */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 480px) {
      .error-container {
        padding: 32px 20px;
      }

      .error-title {
        font-size: var(--font-size-xl);
      }

      .error-message {
        font-size: var(--font-size-sm);
      }

      .back-button {
        width: 100%;
        justify-content: center;
        padding: 16px 24px;
      }
    }
  </style>
</head>
<body>

  <main class="error-container" role="main">
    <h1 class="error-code">404</h1>
    <div class="error-divider" aria-hidden="true"></div>
    <h2 class="error-title">Page not found</h2>
    <p class="error-message">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <a href="/index.html" class="back-button" id="back-to-dashboard">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 12H5"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Back to Dashboard
    </a>
  </main>

</body>
</html>
